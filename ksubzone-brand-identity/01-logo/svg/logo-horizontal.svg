<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 220" role="img" aria-labelledby="logo-horizontal-title">
  <title id="logo-horizontal-title">Ksubzone.com horizontal logo</title>
  <rect width="900" height="220" fill="#FFFFFF"/>
  <svg x="58" y="48" width="124" height="124" viewBox="0 0 96 96">
  <title id="logo-horizontal-symbol-title">Ksubzone KSZ symbol</title>
  <desc id="logo-horizontal-symbol-desc">A bold geometric K monogram with S and Z hidden in a stepped negative-space channel.</desc>
  <defs>
    <linearGradient id="logo-horizontal-symbol-gradient" x1="10" y1="88" x2="88" y2="8" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1D4ED8"/>
      <stop offset="0.48" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#00D5FF"/>
    </linearGradient>
    <filter id="logo-horizontal-symbol-shadow" x="-18%" y="-18%" width="136%" height="136%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#1D4ED8" flood-opacity="0.2"/>
    </filter>
    <mask id="logo-horizontal-symbol-ksz-cut" maskUnits="userSpaceOnUse">
      <rect width="96" height="96" fill="#fff"/>
      <path d="M48 24H78L68 35H56L49 43H76V53H54L46 62H77L86 72H49L36 56L44 48L36 41Z" fill="#000"/>
    </mask>
  </defs>
  
  <g filter="url(#logo-horizontal-symbol-shadow)" mask="url(#logo-horizontal-symbol-ksz-cut)">
    <path fill="url(#logo-horizontal-symbol-gradient)" d="M12 10H34V86H12Z"/>
    <path fill="url(#logo-horizontal-symbol-gradient)" d="M34 42L64 10H91L55 48Z"/>
    <path fill="url(#logo-horizontal-symbol-gradient)" d="M34 54L55 48L91 86H64Z"/>
  </g>
</svg>
  <svg x="224" y="54" width="590" height="105" viewBox="0 0 720 128">
  <title id="logo-horizontal-word-title">Ksubzone.com wordmark</title>
  <style>
    .brand { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; font-size: 78px; font-weight: 820; letter-spacing: -1.4px; }
    .domain { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; font-size: 48px; font-weight: 760; letter-spacing: -0.4px; }
  </style>
  <text x="0" y="86" class="brand" fill="#070711">Ksubzone</text>
  <text x="404" y="86" class="domain" fill="#070711" opacity="0.58">.com</text>
</svg>
</svg>