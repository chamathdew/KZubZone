<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-labelledby="favicon-title">
  <title id="favicon-title">KSubZone Favicon</title>
  <defs>
    <!-- Gradient for the K shape -->
    <linearGradient id="ksz-gradient" x1="10" y1="88" x2="88" y2="8" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1D4ED8"/>
      <stop offset="0.48" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#00D5FF"/>
    </linearGradient>
    
    <!-- Mask to cut out the E shape from the gradient layer -->
    <mask id="ksz-cut" maskUnits="userSpaceOnUse">
      <rect width="96" height="96" fill="#fff"/>
      <path d="M48 24H78L68 35H56L49 43H76V53H54L46 62H77L86 72H49L36 56L44 48L36 41Z" fill="#000"/>
    </mask>
  </defs>

  <!-- Solid black background as requested for the dark logo -->
  <rect width="96" height="96" rx="20" fill="#000000"/>

  <svg x="19" y="15" width="58" height="66" viewBox="0 0 96 96">
    <!-- Underlay: Solid white K shape which shows through the cutout -->
    <g>
      <path fill="#FFFFFF" d="M12 10H34V86H12Z"/>
      <path fill="#FFFFFF" d="M34 42L64 10H91L55 48Z"/>
      <path fill="#FFFFFF" d="M34 54L55 48L91 86H64Z"/>
    </g>
    <!-- Overlay: Gradient K shape with E shape masked out -->
    <g mask="url(#ksz-cut)">
      <path fill="url(#ksz-gradient)" d="M12 10H34V86H12Z"/>
      <path fill="url(#ksz-gradient)" d="M34 42L64 10H91L55 48Z"/>
      <path fill="url(#ksz-gradient)" d="M34 54L55 48L91 86H64Z"/>
    </g>
  </svg>
</svg>
